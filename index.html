<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>iOS Wheel Picker</title>
    <script>
        function __scrollPixelsPerOption(select, firstRealOptionIndex, lastRealOptionIndex) {
            return lastRealOptionIndex > firstRealOptionIndex
                ? (select.scrollHeight - select.clientHeight) / (lastRealOptionIndex - firstRealOptionIndex)
                : 0;
        }

        function __findFirstRealOptionIndex(select) {
            return Array.from(select.options).findIndex(function (option) {
                return option.value;
            });
        }

        function __findLastRealOptionIndex(select) {
            return Array.from(select.options).findLastIndex(function (option) {
                return option.value;
            });
        }

        function __clampCenteredOptionIndex(select, centeredOptionIndex) {
            var wheelPicker = select.__wheelPicker;

            return Math.min(
                Math.max(centeredOptionIndex, wheelPicker.firstRealOptionIndex),
                wheelPicker.lastRealOptionIndex
            );
        }

        function __centeredOptionIndexFromScroll(select) {
            var wheelPicker = select.__wheelPicker;

            if (!wheelPicker.scrollPixelsPerOption) {
                return wheelPicker.firstRealOptionIndex;
            }

            return __clampCenteredOptionIndex(
                select,
                Math.round(select.scrollTop / wheelPicker.scrollPixelsPerOption) + wheelPicker.firstRealOptionIndex
            );
        }

        function __selectedOptionLabel(select) {
            if (!select) {
                return '';
            }

            var option = select.options[select.selectedIndex];
            return option ? option.text : '';
        }

        function __syncOptionColors(select) {
            var selectedIndex = select.selectedIndex;

            Array.from(select.options).forEach(function (option, index) {
                var distance = Math.abs(index - selectedIndex);

                if (distance === 0) {
                    option.style.color = '#1c1c1e';
                } else if (distance === 1) {
                    option.style.color = 'rgba(60, 60, 67, 0.8)';
                } else if (distance === 2) {
                    option.style.color = 'rgba(60, 60, 67, 0.4)';
                } else if (distance === 3) {
                    option.style.color = 'rgba(60, 60, 67, 0.1)';
                } else {
                    option.style.color = '';
                }
            });
        }

        function __syncSelectionFromScroll(select) {
            var centeredOptionIndex = __centeredOptionIndexFromScroll(select);

            select.selectedIndex = centeredOptionIndex;
            __syncOptionColors(select);

            return select.value;
        }

        function __syncScrollFromSelection(select) {
            var centeredOptionIndex = __clampCenteredOptionIndex(select, select.selectedIndex);
            var wheelPicker = select.__wheelPicker;

            select.selectedIndex = centeredOptionIndex;
            select.scrollTop = (centeredOptionIndex - wheelPicker.firstRealOptionIndex) * wheelPicker.scrollPixelsPerOption;
            __syncOptionColors(select);
        }

        function __recalculateWheelPicker(select) {
            var wheelPicker = select.__wheelPicker;

            wheelPicker.scrollPixelsPerOption = __scrollPixelsPerOption(
                select,
                wheelPicker.firstRealOptionIndex,
                wheelPicker.lastRealOptionIndex
            );
        }

        function __initializeWheelPicker(select) {
            var firstRealOptionIndex = __findFirstRealOptionIndex(select);
            var lastRealOptionIndex = __findLastRealOptionIndex(select);

            select.__wheelPicker = {
                firstRealOptionIndex: firstRealOptionIndex,
                lastRealOptionIndex: lastRealOptionIndex,
                scrollPixelsPerOption: __scrollPixelsPerOption(select, firstRealOptionIndex, lastRealOptionIndex)
            };

            __syncScrollFromSelection(select);
            return select.value;
        }
    </script>
    <script type="module" src="datastar-1-0-0-rc-8-d2712d09270519cd.js"></script>
    <style>
        :root {
            --page-bg: #f4f6f8;
            --surface: #ffffff;
            --surface-border: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #57606a;
            --text-muted: #8c959f;
            --field-bg: #ffffff;
            --field-border: #c8d1db;
            --focus-ring: rgba(9, 105, 218, 0.16);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 24px 16px;
            background: var(--page-bg);
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: var(--text-primary);
        }

        .picker-card {
            width: min(100%, 360px);
            padding: 20px;
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            background: var(--surface);
        }

        .picker-title {
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: none;
            color: var(--text-secondary);
        }

        .wheel-select {
            appearance: none;
            -webkit-appearance: none;
            display: block;
            width: 100%;
            padding: 0;
            border: 1px solid var(--field-border);
            border-radius: 8px;
            background: var(--field-bg);
            font-family: inherit;
            font-size: 16px;
            font-weight: 400;
            text-align: center;
            text-align-last: center;
            overflow-y: auto;
            scrollbar-width: auto;
            transition: border-color 120ms ease, box-shadow 120ms ease;
        }

        .wheel-select::-webkit-scrollbar {
            width: 10px;
        }

        .wheel-select:focus {
            outline: none;
            border-color: #0969da;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .wheel-select option {
            padding: 6px 10px;
            background: var(--field-bg);
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 400;
        }

        .wheel-select option:checked {
            color: var(--text-primary);
            background: #edf2f7;
        }

        .picker-result {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .picker-result strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .signals-debug {
            margin-top: 16px;
            padding: 10px 12px;
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            background: #f6f8fa;
            font-family: "SF Mono", "Menlo", "Courier New", monospace;
            font-size: 11px;
            line-height: 1.45;
            color: var(--text-secondary);
            white-space: pre;
            overflow-x: auto;
        }

        .style-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .style-toggle input {
            width: 16px;
            height: 16px;
        }

    </style>
</head>
<body data-signals="{styleAsWheel: true}">
    <div class="picker-card">
        <p class="picker-title">Months</p>

        <label class="style-toggle">
            <input type="checkbox" data-bind="styleAsWheel" checked>
            Style as wheel
        </label>

        <select
                data-ref="monthSelect"
                data-class="{ 'wheel-select' : $styleAsWheel }"
                size="5"
                aria-label="Kies een optie"
                data-bind="month"
                data-init="$month = __initializeWheelPicker(el)"
                data-on-resize="__recalculateWheelPicker(el); __syncScrollFromSelection(el)"
                data-on:scroll="$month = __syncSelectionFromScroll(el)"
                data-on:change="__syncScrollFromSelection(el)"
                data-effect="$month; __syncOptionColors(el)">
            <option value="" disabled aria-hidden="true"></option>
            <option value="" disabled aria-hidden="true"></option>
            <option value="1" selected>January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
            <option disabled aria-hidden="true"></option>
            <option disabled aria-hidden="true"></option>
        </select>

    <p class="picker-result">
        <strong data-text="__selectedOptionLabel($monthSelect)"></strong> <span data-text="$month"></span>
    </p>

    <pre class="signals-debug" data-json-signals></pre>

    </div>

</body>
</html>
