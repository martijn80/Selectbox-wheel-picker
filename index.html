<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selectbox kiezer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .picker-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.14);
      width: 300px;
    }

    .picker-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
      letter-spacing: -0.2px;
      margin-bottom: 20px;
    }

    /* ── Native expanded selectbox ───────────────────────────── */
    .picker-select {
      width: 100%;
      font-size: 17px;
      font-family: inherit;
      border: 1px solid #c6c6c8;
      border-radius: 14px;
      background: #f9f9fb;
      color: #1c1c1e;
      padding: 4px 0;
    }

    .picker-select option {
      padding: 8px 16px;
      text-align: center;
    }

    /* ── Result display ──────────────────────────────────────── */
    .picker-result {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #3c3c43;
    }

    .picker-result strong {
      color: #007aff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="picker-card">
    <div class="picker-title">Kies een optie</div>

    <select class="picker-select" size="5" id="pickerSelect"></select>

    <div class="picker-result">
      Geselecteerd:&nbsp;
      <strong id="pickerResult">Geen</strong>
    </div>
  </div>

  <script>
    var COUNT = 20;
    var select = document.getElementById('pickerSelect');
    for (var i = 0; i < COUNT; i++) {
      var option = document.createElement('option');
      option.value = i + 1;
      option.textContent = 'Optie ' + (i + 1);
      select.appendChild(option);
    }

    select.addEventListener('change', function () {
      var result = document.getElementById('pickerResult');
      result.textContent = select.value ? 'Optie ' + select.value : 'Geen';
    });
  </script>

</body>
</html>
