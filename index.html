<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS Wheel Picker</title>
  <script type="module" src="datastar.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

     /* ── Item height — single source of truth for all wheel dimensions.
        $itemH in data-signals must equal this value in px.
        (CSS custom properties are not accessible from HTML attributes without
         JavaScript, so the numeric value is also held as a Datastar signal.) */
    :root { --item-h: 44px; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .picker-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.14);
      width: 300px;
    }

    .picker-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
      letter-spacing: -0.2px;
      margin-bottom: 20px;
    }

    /* ── Outer wheel wrapper — clips overflow, stacking context ── */
    .wheel-outer {
      position: relative;
      height: calc(var(--item-h) * 5); /* 5 visible rows */
      border-radius: 14px;
      overflow: hidden;
      background: #f9f9fb;
    }

    /* Gradient fade — top (sits above the select via z-index) */
    .wheel-outer::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: calc(var(--item-h) * 2); /* 2 × item height */
      background: linear-gradient(to bottom, #f9f9fb 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Gradient fade — bottom */
    .wheel-outer::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: calc(var(--item-h) * 2);
      background: linear-gradient(to top, #f9f9fb 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Hairline selection indicator at the centre ──────────── */
    .wheel-selector {
      position: absolute;
      top: 50%;
      inset-inline: 0;
      height: var(--item-h);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 3;
    }

    .wheel-selector::before,
    .wheel-selector::after {
      content: '';
      position: absolute;
      inset-inline: 16px;
      height: 0.5px;
      background: #c6c6c8;
    }

    .wheel-selector::before { top: 0; }
    .wheel-selector::after  { bottom: 0; }

    /* ── Native expanded select — base element ───────────────── */
    .wheel-select {
      /* Strip native chrome */
      appearance: none;
      -webkit-appearance: none;

      /* Fill the entire .wheel-outer */
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      background: transparent;

      /* Typography */
      font-family: inherit;
      font-size: 19px;
      color: rgba(60, 60, 67, 0.45);
      text-align: center;
      text-align-last: center;

      /* Hide scrollbar, keep scroll */
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;

      /* Below the overlays */
      position: relative;
      z-index: 1;
      cursor: pointer;

      /* Top + bottom padding allow the first/last option to be centred */
      padding-block: calc(var(--item-h) * 2);

      /* Snap each option to the centre of the visible area */
      scroll-snap-type: y mandatory;
    }

    .wheel-select::-webkit-scrollbar { display: none; }
    .wheel-select:focus              { outline: none; }

    /* ── Individual options ───────────────────────────────────── */
    .wheel-select option {
      /* Each option renders at --item-h (44 px: 12px padding-top + ~19px font + ~1px leading + 12px padding-bottom).
         $itemH in data-signals must match this rendered height. */
      padding: 12px 0; /* top + bottom → ~44 px total with 19 px text */
      text-align: center;
      background: transparent;
      color: rgba(60, 60, 67, 0.45);
      font-size: 19px;

      /* Snap the centre of each option to the centre of the scroll viewport */
      scroll-snap-align: center;
    }

    /* iOS: the centred (selected) item is bold and full-opacity */
    .wheel-select option:checked {
      color: #1c1c1e;
      font-size: 22px;
      font-weight: 600;
      /* Use a gradient instead of a solid colour to override the UA's default
         blue/highlight background on :checked <option> elements in Chromium,
         while keeping the background visually transparent. */
      background: linear-gradient(transparent, transparent);
    }

    /* ── Result display ──────────────────────────────────────── */
    .picker-result {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #3c3c43;
    }

    .picker-result strong {
      color: #007aff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!--
    data-signals : declares reactive state
                   $selected = current option value (1-based)
                   $itemH    = item height in px; mirrors --item-h in CSS
    data-on-change: Datastar updates $selected when the user picks an option (evt is the DOM event)
    data-text    : reactively renders the selected label in the result area
  -->
  <div class="picker-card"
       data-signals="{selected: 1, itemH: 44}">

    <p class="picker-title">Kies een optie</p>

    <div class="wheel-outer">
      <!-- Hairline indicator marks the "active" centre row -->
      <div class="wheel-selector" aria-hidden="true"></div>

      <!--
        Native expanded select — accessible base element.
        • size="5"            → shows exactly 5 rows; scrollable listbox
        • data-on-change      → on keyboard/click selection: update $selected and
                                snap scrollTop so the chosen option is centred
        • data-on-scrollend   → after a fling/drag scroll: read the snapped
                                scrollTop, derive the centred index, update
                                selectedIndex and $selected, then confirm snap
        $itemH (from data-signals) holds the item height in px; it is the same
        value as --item-h and is used here because HTML attributes cannot read
        CSS custom properties directly.
      -->
      <select
        class="wheel-select"
        size="5"
        aria-label="Kies een optie"
        data-on-change="$selected = +evt.target.value; evt.target.scrollTop = evt.target.selectedIndex * $itemH"
        data-on-scrollend="var idx = Math.min(Math.max(Math.round(evt.target.scrollTop / $itemH), 0), evt.target.options.length - 1); evt.target.selectedIndex = idx; $selected = idx + 1; evt.target.scrollTop = idx * $itemH"
      >
        <option value="1" selected>Optie 1</option>
        <option value="2">Optie 2</option>
        <option value="3">Optie 3</option>
        <option value="4">Optie 4</option>
        <option value="5">Optie 5</option>
        <option value="6">Optie 6</option>
        <option value="7">Optie 7</option>
        <option value="8">Optie 8</option>
        <option value="9">Optie 9</option>
        <option value="10">Optie 10</option>
        <option value="11">Optie 11</option>
        <option value="12">Optie 12</option>
        <option value="13">Optie 13</option>
        <option value="14">Optie 14</option>
        <option value="15">Optie 15</option>
        <option value="16">Optie 16</option>
        <option value="17">Optie 17</option>
        <option value="18">Optie 18</option>
        <option value="19">Optie 19</option>
        <option value="20">Optie 20</option>
      </select>
    </div>

    <!-- data-text evaluates the expression and writes it as text content -->
    <p class="picker-result">
      Geselecteerd:&nbsp;<strong data-text="'Optie ' + $selected"></strong>
    </p>

  </div>

</body>
</html>
