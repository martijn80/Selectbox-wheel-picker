<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS Wielkiezer</title>
  <script type="module" src="datastar.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .picker-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.14);
      width: 300px;
    }

    .picker-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
      letter-spacing: -0.2px;
      margin-bottom: 20px;
    }

    /* ── Outer wheel wrapper — clips overflow ────────────────── */
    .wheel-outer {
      position: relative;
      height: 220px; /* exactly 5 × 44 px */
      overflow: hidden;
      background: #f9f9fb;
      border-radius: 14px;
    }

    /* Gradient fade — top */
    .wheel-outer::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 88px; /* 2 × item height */
      background: linear-gradient(to bottom, rgba(249,249,251,1) 0%, rgba(249,249,251,0) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Gradient fade — bottom */
    .wheel-outer::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 88px;
      background: linear-gradient(to top, rgba(249,249,251,1) 0%, rgba(249,249,251,0) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Hairline selection indicator ────────────────────────── */
    .wheel-selector {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      inset-inline: 0;
      height: 44px;
      pointer-events: none;
      z-index: 3;
    }

    .wheel-selector::before,
    .wheel-selector::after {
      content: '';
      position: absolute;
      inset-inline: 16px;
      height: 0.5px;
      background: #c6c6c8;
    }

    .wheel-selector::before { top: 0; }
    .wheel-selector::after  { bottom: 0; }

    /* ── Scrollable list ─────────────────────────────────────── */
    .wheel-scroll {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      position: relative;
      z-index: 1;
    }

    .wheel-scroll::-webkit-scrollbar { display: none; }

    /* Top + bottom padding let the first/last item reach the centre */
    .wheel-scroll-inner {
      padding: 88px 0;
    }

    /* ── Individual option ───────────────────────────────────── */
    .wheel-item {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 19px;
      font-weight: 400;
      color: rgba(60, 60, 67, 0.45);
      scroll-snap-align: center;
      user-select: none;
      transition: color 0.2s ease, font-size 0.2s ease, font-weight 0.2s ease;
    }

    .wheel-item.selected {
      color: #1c1c1e;
      font-size: 22px;
      font-weight: 500;
    }

    /* ── Result display ──────────────────────────────────────── */
    .picker-result {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #3c3c43;
    }

    .picker-result strong {
      color: #007aff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!--
    data-signals : declares reactive state ($selected holds the chosen 0-based index, -1 = none)
    data-on-click: updates $selected and scrolls the list so the chosen item is in the centre
                   scrollTop = index × 44 px  (88px padding + 44px items → item centre = 110px from top)
    data-class   : adds the "selected" CSS class when the signal matches the item's index
    data-text    : reactively renders the chosen label in the result area
  -->
  <div class="picker-card"
       data-signals="{selected: -1}">

    <div class="picker-title">Kies een optie</div>

    <div class="wheel-outer">
      <div class="wheel-selector"></div>

      <div class="wheel-scroll" id="wheelScroll">
        <!--
          Items worden gegenereerd door onderstaand <script> vóór Datastar laadt.
          Elk item krijgt:
            • data-on-click : stelt $selected in én scrolt de lijst zodat het item gecentreerd is
                              scrollTop = index × ITEM_HEIGHT px
                              (88 px top-padding = 2 × ITEM_HEIGHT → item 0 is centreerbaar)
            • data-class    : voegt de klasse "selected" toe wanneer het item de actieve is
        -->
        <div class="wheel-scroll-inner" id="wheelItems"></div>
      </div>
    </div>

    <!-- data-text evalueert de expressie en schrijft de tekst naar het element -->
    <div class="picker-result">
      Geselecteerd:&nbsp;
      <strong data-text="$selected >= 0 ? 'Optie ' + ($selected + 1) : 'Geen'"></strong>
    </div>

  </div>

  <!--
    Genereer de 20 wheel-items vóór het Datastar module-script initialiseert
    (module-scripts zijn automatisch uitgesteld tot na DOMContentLoaded,
    reguliere inline-scripts draaien direct bij het parsen van de pagina).
    Zo staan de data-on-click / data-class attributen al in de DOM
    wanneer Datastar de pagina verwerkt.
  -->
  <script>
    var ITEM_HEIGHT = 44;
    var COUNT = 20;
    var container = document.getElementById('wheelItems');
    for (var i = 0; i < COUNT; i++) {
      var div = document.createElement('div');
      div.className = 'wheel-item';
      div.setAttribute(
        'data-on-click',
        '$selected = ' + i + '; document.getElementById(\'wheelScroll\').scrollTo({top: ' + (i * ITEM_HEIGHT) + ', behavior: \'smooth\'})'
      );
      div.setAttribute('data-class', '{selected: $selected === ' + i + '}');
      div.textContent = 'Optie ' + (i + 1);
      container.appendChild(div);
    }
  </script>

</body>
</html>
