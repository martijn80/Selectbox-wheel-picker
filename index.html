<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS Wheel Picker</title>
  <script type="module" src="datastar.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .picker-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.14);
      width: 300px;
    }

    .picker-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
      letter-spacing: -0.2px;
      margin-bottom: 20px;
    }

    /* ── Outer wheel wrapper — clips overflow, stacking context ── */
    .wheel-outer {
      position: relative;
      height: 220px; /* 5 × 44 px */
      border-radius: 14px;
      overflow: hidden;
      background: #f9f9fb;
    }

    /* Gradient fade — top (sits above the select via z-index) */
    .wheel-outer::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 88px; /* 2 × item height */
      background: linear-gradient(to bottom, #f9f9fb 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Gradient fade — bottom */
    .wheel-outer::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 88px;
      background: linear-gradient(to top, #f9f9fb 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Hairline selection indicator at the centre ──────────── */
    .wheel-selector {
      position: absolute;
      top: 50%;
      inset-inline: 0;
      height: 44px;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 3;
    }

    .wheel-selector::before,
    .wheel-selector::after {
      content: '';
      position: absolute;
      inset-inline: 16px;
      height: 0.5px;
      background: #c6c6c8;
    }

    .wheel-selector::before { top: 0; }
    .wheel-selector::after  { bottom: 0; }

    /* ── Native expanded select — base element ───────────────── */
    .wheel-select {
      /* Strip native chrome */
      appearance: none;
      -webkit-appearance: none;

      /* Fill the entire .wheel-outer */
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      background: transparent;

      /* Typography */
      font-family: inherit;
      font-size: 19px;
      color: rgba(60, 60, 67, 0.45);
      text-align: center;
      text-align-last: center;

      /* Hide scrollbar, keep scroll */
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;

      /* Below the overlays */
      position: relative;
      z-index: 1;
      cursor: pointer;

      /* Top + bottom padding allow the first/last option to be centred */
      padding-block: 88px;
    }

    .wheel-select::-webkit-scrollbar { display: none; }
    .wheel-select:focus              { outline: none; }

    /* ── Individual options ───────────────────────────────────── */
    .wheel-select option {
      /* Approximate 44 px row height: padding + font-size + leading.
         Exact rendering varies by browser; the wheel stays aligned because
         scrollToCenter() measures actual scrollHeight at runtime. */
      padding: 12px 0; /* top + bottom → ~44 px total with 19 px text */
      text-align: center;
      background: transparent;
      color: rgba(60, 60, 67, 0.45);
      font-size: 19px;
    }

    /* iOS: the centred (selected) item is bold and full-opacity */
    .wheel-select option:checked {
      color: #1c1c1e;
      font-size: 22px;
      font-weight: 600;
      /* Use a gradient instead of a solid colour to override the UA's default
         blue/highlight background on :checked <option> elements in Chromium,
         while keeping the background visually transparent. */
      background: linear-gradient(transparent, transparent);
    }

    /* ── Result display ──────────────────────────────────────── */
    .picker-result {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #3c3c43;
    }

    .picker-result strong {
      color: #007aff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!--
    data-signals : declares reactive state ($selected = current option value, 1-based)
    data-on-change: Datastar updates $selected when the user picks an option (evt is the DOM event)
    data-text    : reactively renders the selected label in the result area
  -->
  <div class="picker-card"
       data-signals="{selected: 1}">

    <p class="picker-title">Kies een optie</p>

    <div class="wheel-outer">
      <!-- Hairline indicator marks the "active" centre row -->
      <div class="wheel-selector" aria-hidden="true"></div>

      <!--
        Native expanded select — accessible base element.
        • size="5"         → shows exactly 5 rows; scrollable listbox
        • data-on-change   → Datastar listens to the change event;
                             evt.target.value holds the chosen option value
      -->
      <select
        class="wheel-select"
        size="5"
        id="pickerSelect"
        aria-label="Kies een optie"
        data-on-change="$selected = +evt.target.value"
      ></select>
    </div>

    <!-- data-text evaluates the expression and writes it as text content -->
    <p class="picker-result">
      Geselecteerd:&nbsp;<strong data-text="'Optie ' + $selected"></strong>
    </p>

  </div>

  <!--
    Generate the 20 <option> elements before the Datastar module script initialises.
    Module scripts are deferred to DOMContentLoaded; this inline script runs
    immediately during HTML parsing, so the data-* attributes are already in the
    DOM when Datastar processes the page.
  -->
  <script>
    (function () {
      var ITEM_HEIGHT = 44;
      var COUNT       = 20;
      var sel         = document.getElementById('pickerSelect');

      for (var i = 0; i < COUNT; i++) {
        var opt = document.createElement('option');
        opt.value       = String(i + 1);
        opt.textContent = 'Optie ' + (i + 1);
        if (i === 0) opt.selected = true;
        sel.appendChild(opt);
      }

      /* Scroll the selected option to the centre of the visible area.
         Called once on load and again on every change event. */
      function scrollToCenter(selectEl) {
        if (!selectEl.options.length) return; /* guard: no options yet */
        var idx         = selectEl.selectedIndex;
        var optHeight   = selectEl.scrollHeight / selectEl.options.length;
        var visibleHalf = selectEl.clientHeight / 2;
        selectEl.scrollTop = idx * optHeight - visibleHalf + optHeight / 2;
      }

      sel.addEventListener('change', function () {
        scrollToCenter(sel);
      });

      /* Centre the initial selection after the layout is known */
      requestAnimationFrame(function () {
        scrollToCenter(sel);
      });
    })();
  </script>

</body>
</html>
