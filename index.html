<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS Wheel Picker</title>
  <script>
    /* Helper called from both data-init and data-on-resize so the $step formula
       lives in one place. ResizeObserver (used by data-on-resize) fires once on
       initial observation, but data-init still runs first and sets $step
       synchronously — avoiding any race window where $step would be 0. */
    function __wheelStep(el, lo, hi) {
      return hi > lo ? (el.scrollHeight - el.clientHeight) / (hi - lo) : 0;
    }

    /* Mark option at index i as selected (aria-selected); clear the previous one. */
    function __wheelMark(el, i) {
      var prev = el.querySelector('[aria-selected]');
      if (prev) prev.removeAttribute('aria-selected');
      el.children[i].setAttribute('aria-selected', 'true');
    }

    /* Compute lo/hi/step once on init; mark the first real option and return the
       three values so data-init can assign them to Datastar signals. */
    function __wheelInit(el) {
      var kids = el.children;
      var lo = -1, hi = -1;
      for (var i = 0; i < kids.length; i++) {
        if (kids[i].dataset.value) { if (lo < 0) lo = i; hi = i; }
      }
      var step = __wheelStep(el, lo, hi);
      if (lo >= 0) { __wheelMark(el, lo); }
      return [lo, hi, step];
    }

    /* Handle a click/tap on an option div: smooth-scroll it to centre, then blur. */
    function __wheelClick(el, lo, hi, step, evt) {
      var opt = evt.target.closest('[data-value]');
      if (opt) {
        var idx = Array.prototype.indexOf.call(el.children, opt);
        if (idx >= lo && idx <= hi) {
          el.scrollTo({ top: (idx - lo) * step, behavior: 'smooth' });
        }
        el.blur();
      }
    }

    /* Handle arrow-key navigation: move one step up or down. */
    function __wheelKey(el, i, lo, hi, step, evt) {
      if (evt.key === 'ArrowDown' || evt.key === 'ArrowUp') {
        evt.preventDefault();
        var delta = evt.key === 'ArrowDown' ? 1 : -1;
        el.scrollTo({ top: (Math.min(Math.max(i + delta, lo), hi) - lo) * step, behavior: 'smooth' });
      }
    }
  </script>
  <script type="module" src="datastar-1-0-0-rc-8-d2712d09270519cd.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .picker-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.14);
      width: 300px;
    }

    .picker-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
      letter-spacing: -0.2px;
      margin-bottom: 20px;
    }

    /* ── Outer wheel wrapper — clips overflow, stacking context ── */
    .wheel-outer {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #f9f9fb;
    }

    /* Gradient fade — top (sits above the select via z-index) */
    .wheel-outer::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 40%; /* top 2 of 5 visible rows */
      background: linear-gradient(to bottom, #f9f9fb 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Gradient fade — bottom */
    .wheel-outer::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 40%; /* bottom 2 of 5 visible rows */
      background: linear-gradient(to top, #f9f9fb 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Hairline selection indicator at the centre ──────────── */
    .wheel-selector {
      position: absolute;
      top: 50%;
      inset-inline: 0;
      height: 20%; /* centre 1 of 5 visible rows */
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 3;
    }

    .wheel-selector::before,
    .wheel-selector::after {
      content: '';
      position: absolute;
      inset-inline: 16px;
      height: 0.5px;
      background: #c6c6c8;
    }

    .wheel-selector::before { top: 0; }
    .wheel-selector::after  { bottom: 0; }

    /* ── Custom scroll container — replaces native <select> ─────
       Using a plain <div> instead of <select size="5"> gives the
       browser full control over touch-scroll physics (fling / gentle
       swipe) on iOS and Android, where <select> listboxes do not
       respond to swipe gestures.                                    */
    .wheel-select {
      /* Fill the entire .wheel-outer */
      display: block;
      width: 100%;
      /* 5 visible rows × 40 px each */
      height: 200px;
      border: none;
      outline: none;
      border-radius: 14px;
      background: transparent;

      /* Typography */
      font-family: inherit;
      font-size: 19px;
      color: rgba(60, 60, 67, 0.45);

      /* Scrollable, touch-friendly */
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch; /* momentum scroll on iOS */
      overscroll-behavior: contain;      /* prevent page scroll bleed */
      scrollbar-width: none;
      -ms-overflow-style: none;

      /* Below the overlays */
      position: relative;
      z-index: 1;
      cursor: pointer;

      /* Snap each option to the centre of the visible area */
      scroll-snap-type: y mandatory;
    }

    .wheel-select::-webkit-scrollbar { display: none; }
    .wheel-select:focus              { outline: none; }

    /* ── Individual option rows ───────────────────────────────── */
    .wheel-option {
      /* Each row is exactly 1/5 of the visible container height */
      height: 40px;
      flex-shrink: 0;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      font-size: 19px;
      color: rgba(60, 60, 67, 0.45);
      user-select: none;

      /* Snap the centre of each row to the centre of the scroll viewport */
      scroll-snap-align: center;
    }

    /* The centred (selected) row shows in full-opacity dark text. */
    .wheel-option[aria-selected] {
      color: #1c1c1e;
    }

    /* ── Result display ──────────────────────────────────────── */
    .picker-result {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #3c3c43;
    }

    .picker-result strong {
      color: #007aff;
      font-weight: 600;
    }

    /* ── Signal debug ────────────────────────────────────────── */
    .signals-debug {
      margin-top: 16px;
      padding: 10px 12px;
      background: #f2f2f7;
      border-radius: 10px;
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 12px;
      color: #3c3c43;
      white-space: pre;
      overflow-x: auto;
    }

    /* ── CSS-toggle ───────────────────────────────────────────── */
    .css-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 14px;
      color: #3c3c43;
      cursor: pointer;
      user-select: none;
    }

    .css-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #007aff;
    }

    /* ── CSS uitschakelen: reset alle wheel-picker stijlen ─────── */
    .css-uit .wheel-outer {
      height: auto;
      border-radius: 0;
      overflow: visible;
      background: none;
    }

    .css-uit .wheel-outer::before,
    .css-uit .wheel-outer::after {
      display: none;
    }

    .css-uit .wheel-selector {
      display: none;
    }

    .css-uit .wheel-select {
      height: auto;
      max-height: 200px;
      border-radius: 0;
      overflow-y: auto;
      scroll-snap-type: none;
      overscroll-behavior: auto;
      background: none;
      display: block;
      width: 70%;
      margin: 0 auto;
      border: 1px solid #ccc;
      cursor: default;
    }

    .css-uit .wheel-select::-webkit-scrollbar { display: revert; }

    .css-uit .wheel-option {
      scroll-snap-align: none;
      height: auto;
      padding: 2px 8px;
      justify-content: flex-start;
      cursor: default;
    }

    /* Hide the padding-only placeholder rows in plain-list mode */
    .css-uit .wheel-option[aria-hidden] {
      display: none;
    }

    .css-uit .wheel-option[aria-selected] {
      background: Highlight;
      color: HighlightText;
    }
  </style>
</head>
<body>

  <!--
    data-signals      : declares reactive state
                        $selected = current option value (1-based)
                        $lo, $hi  = first/last real (non-placeholder) option index
                        $step     = scroll pixels between adjacent options
                        $i        = computed centred option index after each wheel stop
    data-text         : reactively renders the selected label in the result area
    data-json-signals : renders all current signal values as live JSON at the bottom

    Note: since RC.6 the attribute key delimiter changed from "-" to ":" for the built-in
    plugins (e.g. data-on:scrollend). Dedicated compound plugins such as
    data-on-intersect and data-on-interval keep their hyphens unchanged.

    Initialisation vs. scroll:
      $lo and $hi are truly static (they depend only on the option list, which never
      changes) and are therefore computed once in data-init.
      $step depends on the element's scroll dimensions (scrollHeight, clientHeight),
      which change whenever the CSS is toggled on/off or the window is resized.
      It is therefore set in data-init and kept up-to-date by data-on-resize.
      $i and $selected are updated in data-on:scrollend (not data-on:scroll) so
      that the scroll/snap animation runs completely free of JS work, preventing
      stutter while the wheel is spinning.
  -->
  <div class="picker-card"
       data-signals="{selected: 1, cssAan: true, lo: 0, hi: 0, step: 0, i: 0}"
       data-class='{"css-uit": !$cssAan}'>

    <p class="picker-title">Kies een optie</p>

    <div class="wheel-outer">
      <!-- Hairline indicator marks the "active" centre row -->
      <div class="wheel-selector" aria-hidden="true"></div>

      <!--
        Custom scroll container — replaces <select size="5">.

        Why a <div>?
          A <select> listbox does not respond to touch-swipe (fling or gentle
          drag) on mobile browsers — iOS Safari and Android Chrome do not pass
          touch events through to the native listbox scroll engine.  A plain
          overflow-y:scroll <div> with scroll-snap-type lets the browser apply
          its full native touch-scroll physics (momentum / spring snap) across
          all platforms.

        Structure mirrors the old <select>:
          • Two empty placeholder rows at start and end let Optie 1 / Optie 20
            scroll to the centre without CSS padding.
          • role="listbox" / role="option" preserve screen-reader semantics.
          • tabindex="0" keeps keyboard focus; arrow-key handling is in
            data-on:keydown via __wheelKey().

        • data-init        → on first render: calls __wheelInit(el) which computes
                            $lo/$hi (first/last real row indices), $step (px per
                            scroll step), and marks the initial aria-selected row.
                            Signals $i and $selected are then set from the result.

        • data-on-resize   → recalculates $step whenever layout changes
                            (CSS toggle on/off, window resize).

        • data-on:scrollend → fired once the wheel comes to rest (after the
                             spring-snap animation completes): decode the centred
                             row, mark it aria-selected, update $i / $selected.
                             Using 'scrollend' instead of 'scroll' keeps the
                             scroll/snap animation entirely free of JS work,
                             eliminating stutter while the wheel is spinning.

        • data-on:click    → tap a row to smooth-scroll it to centre, then blur.

        • data-on:keydown  → Up/Down arrow navigation via __wheelKey().
      -->
      <div
        class="wheel-select"
        role="listbox"
        tabindex="0"
        aria-label="Kies een optie"
        data-init="var r = __wheelInit(el); $lo = r[0]; $hi = r[1]; $step = r[2]; if ($lo >= 0 && $lo <= $hi) { $i = $lo; $selected = +el.children[$lo].dataset.value; }"
        data-on-resize="$step = __wheelStep(el, $lo, $hi)"
        data-on:scrollend="$i = Math.min(Math.max(Math.round(el.scrollTop / $step) + $lo, $lo), $hi); __wheelMark(el, $i); $selected = +el.children[$i].dataset.value"
        data-on:click="__wheelClick(el, $lo, $hi, $step, evt)"
        data-on:keydown="__wheelKey(el, $i, $lo, $hi, $step, evt)"
      >
        <div class="wheel-option" aria-hidden="true"></div>
        <div class="wheel-option" aria-hidden="true"></div>
        <div class="wheel-option" role="option" data-value="1">Optie 1</div>
        <div class="wheel-option" role="option" data-value="2">Optie 2</div>
        <div class="wheel-option" role="option" data-value="3">Optie 3</div>
        <div class="wheel-option" role="option" data-value="4">Optie 4</div>
        <div class="wheel-option" role="option" data-value="5">Optie 5</div>
        <div class="wheel-option" role="option" data-value="6">Optie 6</div>
        <div class="wheel-option" role="option" data-value="7">Optie 7</div>
        <div class="wheel-option" role="option" data-value="8">Optie 8</div>
        <div class="wheel-option" role="option" data-value="9">Optie 9</div>
        <div class="wheel-option" role="option" data-value="10">Optie 10</div>
        <div class="wheel-option" role="option" data-value="11">Optie 11</div>
        <div class="wheel-option" role="option" data-value="12">Optie 12</div>
        <div class="wheel-option" role="option" data-value="13">Optie 13</div>
        <div class="wheel-option" role="option" data-value="14">Optie 14</div>
        <div class="wheel-option" role="option" data-value="15">Optie 15</div>
        <div class="wheel-option" role="option" data-value="16">Optie 16</div>
        <div class="wheel-option" role="option" data-value="17">Optie 17</div>
        <div class="wheel-option" role="option" data-value="18">Optie 18</div>
        <div class="wheel-option" role="option" data-value="19">Optie 19</div>
        <div class="wheel-option" role="option" data-value="20">Optie 20</div>
        <div class="wheel-option" aria-hidden="true"></div>
        <div class="wheel-option" aria-hidden="true"></div>
      </div>
    </div>

    <!-- data-text evaluates the expression and writes it as text content -->
    <p class="picker-result">
      Geselecteerd:&nbsp;<strong data-text="'Optie ' + $selected"></strong>
    </p>

    <!-- Toggle to enable/disable the CSS styling -->
    <label class="css-toggle">
      <input
        type="checkbox"
        checked
        data-on:change="$cssAan = evt.target.checked"
      />
      ios wheel picker style
    </label>

    <!-- Live signal inspector — data-json-signals writes all current signal
         values as pretty-printed JSON into this element's textContent -->
    <pre class="signals-debug" data-json-signals></pre>

  </div>

</body>
</html>
