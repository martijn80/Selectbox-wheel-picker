<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selectbox</title>
  <script type="module" src="datastar-1-0-0-rc-8-d2712d09270519cd.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .picker-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.14);
      width: 300px;
    }

    .picker-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #1c1c1e;
      letter-spacing: -0.2px;
      margin-bottom: 20px;
    }

    /* ── Native select ────────────────────────────────────────── */
    .native-select {
      display: block;
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      color: #3c3c43;
      text-align: center;
      text-align-last: center;
      background: #f2f2f7;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 6px 8px;
      cursor: pointer;
    }

    .native-select:focus {
      outline: none;
    }

    .native-select option {
      text-align: center;
      background: #f2f2f7;
    }

    /* ── Result display ──────────────────────────────────────── */
    .picker-result {
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      color: #3c3c43;
    }

    .picker-result strong {
      color: #007aff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="picker-card"
       data-signals="{selected: 1}">

    <p class="picker-title">Kies een optie</p>

    <select
      class="native-select"
      aria-label="Kies een optie"
      data-on:change="$selected = +el.value"
    >
      <option value="1" selected>Optie 1</option>
      <option value="2">Optie 2</option>
      <option value="3">Optie 3</option>
      <option value="4">Optie 4</option>
      <option value="5">Optie 5</option>
      <option value="6">Optie 6</option>
      <option value="7">Optie 7</option>
      <option value="8">Optie 8</option>
      <option value="9">Optie 9</option>
      <option value="10">Optie 10</option>
      <option value="11">Optie 11</option>
      <option value="12">Optie 12</option>
      <option value="13">Optie 13</option>
      <option value="14">Optie 14</option>
      <option value="15">Optie 15</option>
      <option value="16">Optie 16</option>
      <option value="17">Optie 17</option>
      <option value="18">Optie 18</option>
      <option value="19">Optie 19</option>
      <option value="20">Optie 20</option>
    </select>

    <!-- data-text evaluates the expression and writes it as text content -->
    <p class="picker-result">
      Geselecteerd:&nbsp;<strong data-text="'Optie ' + $selected"></strong>
    </p>

  </div>

</body>
</html>
